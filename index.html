<!DOCTYPE html>
<html>
<head>
  <title>CSV AI Analyzer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    textarea { width: 100%; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; margin-top: 10px; }
    #loading { display: none; color: blue; font-weight: bold; }
  </style>
</head>
<body>
  <h2>CSV AI Analyzer</h2>
  <p>Upload a CSV file with exactly 3 values per row.</p>
  <input type="file" id="csvFile" accept=".csv">
  <br>
  <button id="analyze">Analyze with AI</button>
  <span id="loading">Analyzing... Please wait.</span>

  <h3>AI Interpretation:</h3>
  <textarea id="output" rows="10" readonly placeholder="AI output will appear here..."></textarea>

  <script>
    function csvToJson(csvText) {
      const lines = csvText.trim().split('\n');
      const result = [];
      const headers = lines[0].split(',').map(h => h.trim());
      for (let i = 1; i < lines.length; i++) {
        const obj = {};
        const currentline = lines[i].split(',');
        headers.forEach((header, index) => {
          obj[header] = currentline[index]?.trim() || "";
        });
        result.push(obj);
      }
      return result;
    }

    document.getElementById('analyze').onclick = async () => {
      const file = document.getElementById('csvFile').files[0];
      const output = document.getElementById('output');
      const loading = document.getElementById('loading');

      if (!file) {
        alert("Please upload a CSV file.");
        return;
      }

      output.value = "";
      loading.style.display = "inline";

      try {
        const text = await file.text();
        const jsonData = csvToJson(text);

        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: jsonData })
        });

        const data = await res.json();
        output.value = data.interpretation || "No response from AI.";
      } catch (err) {
        console.error(err);
        output.value = "Error connecting to AI.";
      } finally {
        loading.style.display = "none";
      }
    };
  </script>
</body>
</html>
