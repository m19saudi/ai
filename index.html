<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💧 WaterWise Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #E6F7FF; margin: 0; padding: 0; }
    header { background: #1890FF; color: white; padding: 1rem; text-align: center; font-size: 1.8rem; }
    main { padding: 2rem; max-width: 900px; margin: auto; }
    .card { background: white; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    textarea { width: 100%; border-radius: 5px; padding: 0.5rem; font-family: monospace; }
    input[type="file"] { margin: 1rem 0; }
    button { background: #1890FF; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; }
    button:hover { background: #1474cc; }
    canvas { margin-top: 1rem; }
    .alert { padding: 0.5rem; border-radius: 5px; margin: 0.5rem 0; font-weight: bold; }
    .alert.safe { background: #52C41A; color: white; }
    .alert.warning { background: #FAAD14; color: white; }
    .alert.danger { background: #FF4D4F; color: white; }
  </style>
</head>
<body>
  <header>💧 WaterWise Analyzer</header>
  <main>
    <div class="card">
      <h3>Upload your water CSV data</h3>
      <input type="file" id="csvFile" accept=".csv" />
      <button id="analyze">Analyze Water Data</button>
    </div>

    <div class="card">
      <h3>AI Analysis</h3>
      <textarea id="aiOutput" rows="8" readonly placeholder="AI analysis will appear here..."></textarea>
    </div>

    <div class="card">
      <h3>Summary Table</h3>
      <table id="summaryTable" border="1" style="width:100%; border-collapse: collapse; display:none;">
        <thead><tr id="summaryHeader"></tr></thead>
        <tbody id="summaryBody"></tbody>
      </table>
    </div>

    <div class="card">
      <h3>Charts</h3>
      <canvas id="chartCanvas"></canvas>
    </div>
  </main>

  <script>
    // Utility to parse CSV to JSON
    function csvToJson(csv) {
      const lines = csv.trim().split("\n");
      const headers = lines[0].split(",");
      return lines.slice(1).map(line => {
        const data = line.split(",");
        const obj = {};
        headers.forEach((h,i)=>obj[h.trim()]=isNaN(data[i])?data[i].trim():parseFloat(data[i]));
        return obj;
      });
    }

    // Analyze button
    document.getElementById('analyze').onclick = async () => {
      const file = document.getElementById('csvFile').files[0];
      const aiOutput = document.getElementById('aiOutput');
      aiOutput.value = "Analyzing...";
      document.getElementById('summaryTable').style.display = 'none';

      if (!file) { aiOutput.value = "Please upload a CSV file."; return; }

      const text = await file.text();
      const jsonData = csvToJson(text);

      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userInput: jsonData })
      });

      const data = await res.json();
      aiOutput.value = data.output;

      // Build summary table
      const keys = Object.keys(jsonData[0]);
      const headerRow = document.getElementById('summaryHeader');
      headerRow.innerHTML = "";
      keys.forEach(k => { const th = document.createElement('th'); th.textContent = k; headerRow.appendChild(th); });

      const body = document.getElementById('summaryBody');
      body.innerHTML = "";
      jsonData.forEach((row, i) => {
        const tr = document.createElement('tr');
        keys.forEach(k => { const td = document.createElement('td'); td.textContent = row[k]; tr.appendChild(td); });
        body.appendChild(tr);
      });
      document.getElementById('summaryTable').style.display = 'table';

      // Chart example: first numeric fields
      const numericKeys = keys.filter(k=>typeof jsonData[0][k]==='number');
      if(numericKeys.length>0){
        const ctx = document.getElementById('chartCanvas').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: jsonData.map((_,i)=>i+1),
            datasets: numericKeys.map(k=>({
              label:k,
              data: jsonData.map(r=>r[k]),
              fill:false,
              borderColor: '#1890FF'
            }))
          },
          options:{responsive:true, plugins:{legend:{position:'top'}}}
        });
      }
    };
  </script>
</body>
</html>
